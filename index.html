<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spots">
    <meta name="author" content="Joseph Lin">
    <meta name="keywords" content="">
    <title>Spots</title>

    <link rel="stylesheet" href="pages/index.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="page">
        <header class="header">
            <img src="./images/logo.svg" alt="Spots" class="header__logo" />
        </header>
        <main class="content">
            <section class="profile">
                <img src="./images/camera.jpg" alt="camera" class="profile__picture">
                <div class="profile__details">
                    <div class="profile__info">
                        <h1 class="profile__info-title">Japan Feeds</h1>
                        <p class="profile__info-subheading">Japan, one spot at a time</p>
                    </div>
                    <div class="profile__actions">
                        <button type="button" class="profile__button profile__button_type_edit">
                            <img src="./images/edit.svg" alt="pencil" class="profile__button-icon">
                            <span class="profile__button-text">Edit Profile</span>
                        </button>
                        <button type="button" class="profile__button profile__button_type_new-post">
                            <img src="./images/plus.svg" alt="plus sign" class="profile__button-icon">
                            <span class="profile__button-text">New Post</span>
                        </button>
                    </div>
                </div>
            </section>
            <section class="content__cards">
                <ul class="cards">
                    <li class="card">
                        <img src="./images/fuji.jpg" alt="Street in Tokyo" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Mt. Fuji</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/fushimi.jpg" alt="Kyoto neighborhood" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Fushimi Inari Taisha</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/kyoto.jpg" alt="Night lights in Japan" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Kyoto</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/shibuya.jpg" alt="Mountain landscape" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Shibuya Crossing</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/sky-tree.jpg" alt="Japanese street crossing" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Tokyo Sky Tree</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/tokyo-tower.jpg" alt="Temple district" class="card__image">
                        <div class="card__description">
                            <p class="card__title">Tokyo Tower</p>
                            <button type="button" class="card__like-button">
                                <img src="./images/like.svg" alt="Like" class="card__like-icon">
                            </button>
                        </div>
                    </li>
                </ul>
            </section>
        </main>
        <footer class="footer">
            <p class="footer__content"> 2026 &copy; Spots</p>
        </footer>
    </div>
    
</body>
</html>
